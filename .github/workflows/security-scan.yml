name: Security Scan

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve scan base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ -z "$PR_BASE_REF" ]; then
              echo "Missing pull request base ref" >&2
              exit 1
            fi
            SCAN_BASE="origin/$PR_BASE_REF"
          elif [ -n "${BEFORE_SHA:-}" ] && ! printf '%s' "$BEFORE_SHA" | grep -Eq '^0{40}$'; then
            SCAN_BASE="$BEFORE_SHA"
          elif git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            SCAN_BASE="HEAD^"
          else
            SCAN_BASE="HEAD"
          fi

          if ! git rev-parse --verify "$SCAN_BASE^{commit}" >/dev/null 2>&1; then
            echo "Unable to resolve scan base: $SCAN_BASE" >&2
            exit 1
          fi

          printf 'GSD_SCAN_BASE=%s\n' "$SCAN_BASE" >> "$GITHUB_ENV"
          echo "security-scan: using base $SCAN_BASE"

      - name: Prompt injection scan
        run: |
          chmod +x scripts/prompt-injection-scan.sh
          scripts/prompt-injection-scan.sh --diff "$GSD_SCAN_BASE"

      - name: Base64 obfuscation scan
        run: |
          chmod +x scripts/base64-scan.sh
          scripts/base64-scan.sh --diff "$GSD_SCAN_BASE"

      - name: Secret scan
        run: |
          chmod +x scripts/secret-scan.sh
          scripts/secret-scan.sh --diff "$GSD_SCAN_BASE"

      - name: Planning directory check
        run: |
          # Ensure .planning/ runtime data is not committed in PRs
          # (The GSD repo itself has .planning/ in .gitignore, but PRs
          # from forks or misconfigured clones might include it)
          PLANNING_FILES=$(git diff --name-only --diff-filter=ACMR "$GSD_SCAN_BASE"...HEAD | grep '^\.planning/' || true)
          if [ -n "$PLANNING_FILES" ]; then
            echo "FAIL: .planning/ runtime data must not be committed to PRs"
            echo "The following .planning/ files were found in this PR:"
            echo "$PLANNING_FILES"
            echo ""
            echo "Add .planning/ to your .gitignore and remove these files from the commit."
            exit 1
          fi
          echo "planning-dir-check: clean"
