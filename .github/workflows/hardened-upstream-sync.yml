name: Hardened Upstream Sync

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hardened-upstream-sync
  cancel-in-progress: false

env:
  BASE_BRANCH: main
  UPSTREAM_REPO: https://github.com/gsd-build/get-shit-done.git
  UPSTREAM_RELEASE_REPO: gsd-build/get-shit-done

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_BRANCH: main
      UPSTREAM_REPO: https://github.com/gsd-build/get-shit-done.git
      UPSTREAM_RELEASE_REPO: gsd-build/get-shit-done

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve latest stable upstream release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_json="$(
            gh release list \
              --repo "$UPSTREAM_RELEASE_REPO" \
              --exclude-drafts \
              --exclude-pre-releases \
              --limit 50 \
              --json tagName,isDraft,isPrerelease,publishedAt
          )"

          stable_tag="$(
            node -e '
              const releases = JSON.parse(process.argv[1]);
              const stable = releases.find((release) =>
                release &&
                release.isDraft === false &&
                release.isPrerelease === false &&
                /^v?[0-9]+[.][0-9]+[.][0-9]+$/.test(release.tagName || "")
              );
              if (stable) process.stdout.write(stable.tagName);
            ' "$release_json"
          )"

          if [ -z "$stable_tag" ]; then
            echo "::error::No stable upstream GitHub release tag found for ${UPSTREAM_RELEASE_REPO}"
            exit 1
          fi

          echo "Resolved stable upstream release: ${stable_tag}"
          printf 'UPSTREAM_REF=%s\n' "$stable_tag" >> "$GITHUB_ENV"

      - name: Sync upstream, build, test, scan, and update main
        shell: bash
        env:
          GH_PUSH_TOKEN: ${{ github.token }}
        run: |
          cleanup_git_credentials() {
            git config --local --unset-all http.https://github.com/.extraheader || true
          }
          trap cleanup_git_credentials EXIT

          if [ -z "${GH_PUSH_TOKEN:-}" ]; then
            echo "GH_PUSH_TOKEN is not set" >&2
            exit 1
          fi

          printf '::add-mask::%s\n' "$GH_PUSH_TOKEN"
          auth_header="$(printf 'x-access-token:%s' "$GH_PUSH_TOKEN" | base64 | tr -d '\n')"
          printf '::add-mask::%s\n' "$auth_header"
          unset GH_PUSH_TOKEN
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${auth_header}"

          bash ./scripts/unattended-upstream-sync.sh \
            --repo "$GITHUB_WORKSPACE" \
            --base-branch "$BASE_BRANCH" \
            --upstream-url "$UPSTREAM_REPO" \
            --upstream-ref "$UPSTREAM_REF" \
            --log-dir "$RUNNER_TEMP/gsd-upstream-sync" \
            --require-stable-upstream-ref \
            --require-push \
            --skip-install
