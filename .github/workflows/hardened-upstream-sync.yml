name: Hardened Upstream Sync

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: hardened-upstream-sync
  cancel-in-progress: false

env:
  BASE_BRANCH: codex/harden-install-surface
  SYNC_BRANCH: chore/upstream-sync-codex-harden-install-surface
  UPSTREAM_REPO: https://github.com/gsd-build/get-shit-done.git
  UPSTREAM_REF: main

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      BASE_BRANCH: codex/harden-install-surface
      SYNC_BRANCH: chore/upstream-sync-codex-harden-install-surface
      UPSTREAM_REPO: https://github.com/gsd-build/get-shit-done.git
      UPSTREAM_REF: main

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run hardened upstream sync
        shell: bash
        run: bash ./.github/scripts/hardened-upstream-sync.sh
