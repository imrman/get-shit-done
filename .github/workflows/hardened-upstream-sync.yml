name: Hardened Upstream Sync

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hardened-upstream-sync
  cancel-in-progress: false

env:
  BASE_BRANCH: main
  UPSTREAM_REPO: https://github.com/gsd-build/get-shit-done.git
  UPSTREAM_REF: main

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_BRANCH: main
      UPSTREAM_REPO: https://github.com/gsd-build/get-shit-done.git
      UPSTREAM_REF: main

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream, build, test, scan, and update main
        shell: bash
        run: |
          bash ./scripts/unattended-upstream-sync.sh \
            --repo "$GITHUB_WORKSPACE" \
            --base-branch "$BASE_BRANCH" \
            --upstream-url "$UPSTREAM_REPO" \
            --upstream-ref "$UPSTREAM_REF" \
            --log-dir "$RUNNER_TEMP/gsd-upstream-sync" \
            --skip-install
